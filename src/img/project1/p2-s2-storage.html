<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2 — Centralized Data Storage</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1200px; height:675px; overflow:hidden;
  background:#f0f2f5;
  display:flex; align-items:center; justify-content:center;
  font-family:'Sora', sans-serif;
}
.slide {
  width:1200px; height:675px;
  background:#ffffff;
  display:flex; overflow:hidden; position:relative;
}
.glow {
  position:absolute;
  width:560px; height:560px;
  top:-200px; left:-120px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 68%);
  pointer-events:none;
}

.left {
  width:58%;
  padding:64px 52px 56px 64px;
  display:flex; flex-direction:column;
  justify-content:space-between;
  position:relative; z-index:1;
}
.meta { display:flex; align-items:center; gap:10px; }
.meta-num { font-family:'DM Mono',monospace; font-size:11px; color:#a7f3d0; letter-spacing:0.14em; }
.meta-sep { width:20px; height:1px; background:#d1fae5; }
.meta-stage { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; color:#6ee7b7; letter-spacing:0.1em; text-transform:uppercase; }

.core { flex:1; display:flex; flex-direction:column; justify-content:center; padding:8px 0; }

.title { font-size:50px; font-weight:300; color:#0f172a; letter-spacing:-0.01em; line-height:1.12; margin-bottom:24px; }
.title span {
  background:linear-gradient(135deg, #10b981 10%, #059669 90%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

.hook { font-size:16px; font-weight:400; color:#64748b; line-height:1.6; max-width:400px; margin-bottom:40px; }

.tools { display:flex; align-items:center; gap:8px; }
.tool-tag {
  display:flex; align-items:center; gap:6px;
  padding:7px 14px;
  background:#f0fdf8; border:1px solid #d1fae5; border-radius:8px;
}
.tool-tag-dot { width:5px; height:5px; border-radius:50%; background:#10b981; }
.tool-tag-name { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; color:#047857; letter-spacing:0.04em; }
.tool-sep { font-size:12px; color:#d1fae5; padding:0 2px; }

.nav { display:flex; align-items:center; justify-content:space-between; }
.dots { display:flex; gap:6px; align-items:center; }
.dot { height:3px; border-radius:99px; background:#e2e8f0; width:20px; }
.dot.done { background:#d1fae5; }
.dot.active { background:linear-gradient(90deg,#10b981,#34d399); width:36px; }
.nav-label { font-family:'DM Mono',monospace; font-size:10px; color:#e2e8f0; letter-spacing:0.1em; }

.divider { width:1px; flex-shrink:0; background:linear-gradient(to bottom, transparent 60px, #f1f5f9 60px, #f1f5f9 calc(100% - 60px), transparent calc(100% - 60px)); }

.right { width:42%; padding:52px 52px 52px 44px; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }

.frame {
  width:100%; height:100%; max-width:380px; max-height:480px;
  border-radius:20px;
  background:linear-gradient(150deg, #f0fdf8 0%, #ecfdf5 100%);
  border:1.5px solid #d1fae5;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,1),
    0 2px 8px rgba(16,185,129,0.06),
    0 12px 40px rgba(16,185,129,0.08),
    0 32px 80px rgba(16,185,129,0.05);
  position:relative; overflow:hidden;
}
.frame::after {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
}
</style>
</head>
<body>
<div class="slide">
  <div class="glow"></div>
  <div class="left">
    <div class="meta">
      <div class="meta-num">02</div>
      <div class="meta-sep"></div>
      <div class="meta-stage">Storage</div>
    </div>
    <div class="core">
      <div class="title">Centralized<br><span>Data Storage</span></div>
      <div class="hook">Fabric Pipelines load data into Azure Data Tables — queried like a relational source, no SQL Server licence required.</div>
      <div class="tools">
        <div class="tool-tag"><div class="tool-tag-dot"></div><div class="tool-tag-name">Fabric Pipeline</div></div>
        <div class="tool-sep">·</div>
        <div class="tool-tag"><div class="tool-tag-dot"></div><div class="tool-tag-name">Azure Data Tables</div></div>
        <div class="tool-sep">·</div>
        <div class="tool-tag"><div class="tool-tag-dot"></div><div class="tool-tag-name">Structured Queries</div></div>
      </div>
    </div>
    <div class="nav">
      <div class="dots">
        <div class="dot done"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="nav-label">Power Platform Stack</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="right">
    <div class="frame"></div>
  </div>
</div>
</body>
</html>
