<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4 — Interactive Reporting Layer</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1200px; height:675px; overflow:hidden;
  background:#f0f2f5;
  display:flex; align-items:center; justify-content:center;
  font-family:'Sora', sans-serif;
}
.slide {
  width:1200px; height:675px;
  background:#ffffff; display:flex; overflow:hidden; position:relative;
}
.glow {
  position:absolute; width:560px; height:560px; top:-200px; left:-120px; border-radius:50%;
  background:radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 68%);
  pointer-events:none;
}
.left {
  width:58%; padding:64px 52px 56px 64px;
  display:flex; flex-direction:column; justify-content:space-between;
  position:relative; z-index:1;
}
.meta { display:flex; align-items:center; gap:10px; }
.meta-num { font-family:'DM Mono',monospace; font-size:11px; color:#bae6fd; letter-spacing:0.14em; }
.meta-sep { width:20px; height:1px; background:#e0f2fe; }
.meta-stage { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; color:#7dd3fc; letter-spacing:0.1em; text-transform:uppercase; }

.core { flex:1; display:flex; flex-direction:column; justify-content:center; padding:8px 0; }
.title { font-size:50px; font-weight:300; color:#0f172a; letter-spacing:-0.01em; line-height:1.12; margin-bottom:24px; }
.title span {
  background:linear-gradient(135deg, #0ea5e9 10%, #0284c7 90%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.hook { font-size:16px; font-weight:400; color:#64748b; line-height:1.6; max-width:400px; margin-bottom:40px; }

.tools { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.tool-tag {
  display:flex; align-items:center; gap:6px;
  padding:7px 14px; background:#f0f9ff; border:1px solid #e0f2fe; border-radius:8px;
}
.tool-tag-dot { width:5px; height:5px; border-radius:50%; background:#0ea5e9; }
.tool-tag-name { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; color:#0369a1; letter-spacing:0.04em; }
.tool-sep { font-size:12px; color:#bae6fd; padding:0 2px; }

.nav { display:flex; align-items:center; justify-content:space-between; }
.dots { display:flex; gap:6px; align-items:center; }
.dot { height:3px; border-radius:99px; background:#e2e8f0; width:20px; }
.dot.done-a { background:#e0e7ff; }
.dot.done-b { background:#d1fae5; }
.dot.done-c { background:#fef3c7; }
.dot.active { background:linear-gradient(90deg,#0ea5e9,#38bdf8); width:36px; }

/* complete badge */
.complete {
  display:flex; align-items:center; gap:6px;
  padding:5px 12px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:999px;
}
.complete-text { font-family:'DM Mono',monospace; font-size:9.5px; font-weight:500; color:#16a34a; letter-spacing:0.08em; }

.divider { width:1px; flex-shrink:0; background:linear-gradient(to bottom, transparent 60px, #f1f5f9 60px, #f1f5f9 calc(100% - 60px), transparent calc(100% - 60px)); }

.right { width:42%; padding:52px 52px 52px 44px; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
.frame {
  width:100%; height:100%; max-width:380px; max-height:480px;
  border-radius:20px;
  background:linear-gradient(150deg, #f0faff 0%, #e0f4ff 100%);
  border:1.5px solid #bae6fd;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,1),
    0 2px 8px rgba(14,165,233,0.06),
    0 12px 40px rgba(14,165,233,0.08),
    0 32px 80px rgba(14,165,233,0.05);
  position:relative; overflow:hidden;
}
.frame::after {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
}
</style>
</head>
<body>
<div class="slide">
  <div class="glow"></div>
  <div class="left">
    <div class="meta">
      <div class="meta-num">04</div>
      <div class="meta-sep"></div>
      <div class="meta-stage">Reporting</div>
    </div>
    <div class="core">
      <div class="title">Interactive<br><span>Reporting Layer</span></div>
      <div class="hook">Excel workbooks connect live to the transformed dataset — pivot tables, slicers, and charts that refresh on demand.</div>
      <div class="tools">
        <div class="tool-tag"><div class="tool-tag-dot"></div><div class="tool-tag-name">Excel</div></div>
        <div class="tool-sep">·</div>
        <div class="tool-tag"><div class="tool-tag-dot"></div><div class="tool-tag-name">Pivot tables</div></div>
        <div class="tool-sep">·</div>
        <div class="tool-tag"><div class="tool-tag-dot"></div><div class="tool-tag-name">Slicers</div></div>
      </div>
    </div>
    <div class="nav">
      <div class="dots">
        <div class="dot done-a"></div>
        <div class="dot done-b"></div>
        <div class="dot done-c"></div>
        <div class="dot active"></div>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="right">
    <div class="frame"></div>
  </div>
</div>
</body>
</html>
